<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>play it twice — трек</title>

  <link rel="icon" type="image/png" href="../../images/logo.png">
  <link rel="stylesheet" href="../../styles/track-card.css">
  <link rel="stylesheet" href="../../styles/collection.css">
</head>
<body>

  <div class="track-card">
    <div class="left-column">
      <div class="cover">
        <img id="trackCover" src="../../images/logo.png" alt="Обложка трека">
      </div>

      <div class="track-meta">
        <h3 class="track-title" id="trackTitle">Загрузка...</h3>
        <p class="track-artist" id="trackArtist"></p>
        <p class="track-extra" id="trackExtra"></p>
      </div>

      <div class="player">
        <span class="time">00:00</span>
        <div class="progress">
          <div class="progress-bar"></div>
        </div>
        <span class="time" id="trackDuration">00:00</span>
      </div>

      <button class="action" type="button">Работа с треком</button>
    </div>

    <div class="right-column">
      <div class="tabs">
        <span class="tab active" data-tab="lyrics">текст</span>
        <span class="separator">/</span>
        <span class="tab" data-tab="queue">очередь</span>
      </div>

      <div class="tab-content active" id="lyrics-content">
        <p>Загрузка текста...</p>
      </div>

      <div class="tab-content" id="queue-content">
        <p>Загрузка очереди...</p>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = "https://music-app-server-117v.onrender.com/api";
    const TRACKS_API = `${API_BASE}/tracks`;

    document.addEventListener("DOMContentLoaded", () => {
      initTrackCard();
      initTabs();
      loadTabContent("lyrics");
    });

    function getTrackId() {
      const params = new URLSearchParams(window.location.search);
      return params.get("track") || "1";
    }

    function getImageUrl(image) {
      if (!image) return "../../images/logo.png";

      if (image.startsWith("http")) {
        return image;
      }

      return `../../images/${image}`;
    }

    async function initTrackCard() {
      const trackId = getTrackId();

      try {
        const response = await fetch(`${TRACKS_API}/${trackId}`);

        if (!response.ok) {
          throw new Error("Трек не найден");
        }

        const track = await response.json();
        renderTrack(track);
      } catch (error) {
        console.error(error);
        document.getElementById("trackTitle").textContent = "Трек не найден";
        document.getElementById("trackArtist").textContent = "";
      }
    }

    function renderTrack(track) {
      document.getElementById("trackTitle").textContent =
        track.title || "Без названия";

      document.getElementById("trackArtist").textContent =
        track.artist || "Неизвестный артист";

      document.getElementById("trackExtra").textContent =
        [track.genre, track.year, track.country].filter(Boolean).join(" · ");

      document.getElementById("trackDuration").textContent =
        track.duration || "00:00";

      document.getElementById("trackCover").src =
        getImageUrl(track.image);

      document.getElementById("trackCover").alt =
        `Обложка трека ${track.title || ""}`;
    }

    function initTabs() {
      const tabs = document.querySelectorAll(".tab");
      const tabContents = document.querySelectorAll(".tab-content");

      tabs.forEach(tab => {
        tab.addEventListener("click", () => {
          const tabId = tab.dataset.tab;

          tabs.forEach(item => item.classList.remove("active"));
          tab.classList.add("active");

          tabContents.forEach(content => content.classList.remove("active"));
          document.getElementById(`${tabId}-content`).classList.add("active");

          loadTabContent(tabId);
        });
      });
    }

    async function loadTabContent(tabId) {
      try {
        if (tabId === "lyrics") {
          await loadLyrics();
        }

        if (tabId === "queue") {
          await loadQueue();
        }
      } catch (error) {
        console.error("Ошибка загрузки вкладки:", error);
      }
    }

    async function loadLyrics() {
      const container = document.getElementById("lyrics-content");
      container.innerHTML = "<p>Загрузка текста...</p>";

      try {
        const response = await fetch(`${TRACKS_API}/lyrics`);

        if (!response.ok) {
          throw new Error("Не удалось загрузить текст");
        }

        const data = await response.json();
        container.innerHTML = data.content || "<p>Текст пока не добавлен.</p>";
      } catch (error) {
        console.error(error);
        container.innerHTML = "<p>Не удалось загрузить текст.</p>";
      }
    }

    async function loadQueue() {
      const container = document.getElementById("queue-content");
      container.innerHTML = "<p>Загрузка очереди...</p>";

      try {
        const response = await fetch(`${TRACKS_API}/queue`);

        if (!response.ok) {
          throw new Error("Не удалось загрузить очередь");
        }

        const data = await response.json();
        const tracks = data.content || [];

        if (!tracks.length) {
          container.innerHTML = "<p>Очередь пуста.</p>";
          return;
        }

        container.innerHTML = tracks.map(track => `
          <article class="track" data-track="${track.id}">
            <div class="track__thumb">
              <img src="${getImageUrl(track.image)}" alt="Обложка ${track.title || ""}">
            </div>

            <div class="track__info">
              <h3 class="track__title">${track.title || "Без названия"}</h3>
              <div class="track__meta">${track.artist || "Неизвестный артист"}</div>
            </div>

            <button class="track__btn" type="button">Работа с треком</button>
          </article>
        `).join("");

        document.querySelectorAll("#queue-content .track").forEach(card => {
          card.addEventListener("click", e => {
            if (e.target.closest(".track__btn")) {
              e.stopPropagation();
              console.log("Работа с треком");
              return;
            }

            const trackId = card.dataset.track;
            window.location.href = `track-card_01.html?track=${trackId}`;
          });
        });

      } catch (error) {
        console.error(error);
        container.innerHTML = "<p>Не удалось загрузить очередь.</p>";
      }
    }
  </script>

</body>
</html>
