<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>play it twice — трек</title>
  <link rel="stylesheet" href="../../styles/track-card.css">
  <link rel="stylesheet" href="../../styles/collection.css">

  <link rel="icon" type="image/png" href="../../images/logo.png">
</head>
<body>

    <div class="track-card">
        <div class="left-column">
            <div class="cover">
            <img src="/images/semeinoe_photo_zoya_yachenko.jpg" alt="Обложка альбома">
            </div>
            
            <div class="track-meta">
            <h3 class="track-title">Семейное фото</h3>
            <p class="track-artist">Зоя Ященко, Белая Гвардия · Венеция</p>
            </div>

            <div class="player">
            <span class="time">00:00</span>
            <div class="progress"></div>
            <span class="time">00:00</span>
            </div>
            
            <button class="action">Работа с треком</button>
        </div>
    
        <div class="right-column">
            <div class="tabs">
                <span class="tab active" data-tab="lyrics">текст</span>
                <span class="separator">/</span>
                <span class="tab" data-tab="queue">очередь</span>
            </div>

            <!-- Контент для текста песни -->
            <div class="tab-content active" id="lyrics-content">
                
            </div>

            <!-- Контент для очереди -->
            <div class="tab-content" id="queue-content">
                
        </div>
    </div>
</div>
 <script>
    document.addEventListener('DOMContentLoaded', function() {
      const tabs = document.querySelectorAll('.tab');
      const tabContents = document.querySelectorAll('.tab-content');
      const apiUrl = 'http://music-app-server-117v.onrender.com/api/track/'; // URL для API на сервере

      // Функция для загрузки контента с сервера
      async function loadTabContent(tabId) {
        try {
          const response = await fetch(apiUrl + tabId);
          const data = await response.json();
          
          // Если загружен контент для текста
          if (tabId === 'lyrics') {
            document.getElementById('lyrics-content').innerHTML = data.content;
          }

          // Если загружен контент для очереди
          if (tabId === 'queue') {
            const queueContent = data.content.map(track => {
              return `
                <article class="track">
                  <div class="track__thumb">
                    <img src="${track.image}" alt="">
                  </div>
                  <div class="track__info">
                    <h3 class="track__title">${track.title}</h3>
                    <div class="track__meta">${track.artist}</div>
                  </div>
                  <button class="track__btn">Работа с треком</button>
                </article>
              `;
            }).join('');
            document.getElementById('queue-content').innerHTML = queueContent;
          }
        } catch (error) {
          console.error('Ошибка загрузки данных:', error);
        }
      }

      // Сначала загружаем контент для активной вкладки
      loadTabContent('lyrics'); // Текст по умолчанию

      tabs.forEach(tab => {
        tab.addEventListener('click', function() {
          const tabId = this.getAttribute('data-tab');

          // Убираем активный класс у всех табов
          tabs.forEach(t => t.classList.remove('active'));
          // Добавляем активный класс текущему табу
          this.classList.add('active');

          // Скрываем все контенты
          tabContents.forEach(content => content.classList.remove('active'));
          // Показываем соответствующий контент
          document.getElementById(tabId + '-content').classList.add('active');

          // Загружаем контент для выбранной вкладки
          loadTabContent(tabId);
        });
      });
    });
  </script>
</body>
