<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="icon" type="image/png" href="../../images/logo.png">
  <title>play it twice — сборник</title>
  <link rel="stylesheet" href="../../styles/styles.css">
  <link rel="stylesheet" href="../../styles/collection.css">
  <script src="../../scripts/common.js"></script>
</head>
<body>

<div class="wrapper">

  <!-- Шапка -->
    <header class="header">
      <div class="logo">
        <img src="../../images/logo.png" alt="Логотип сайта" />
      </div>
      <div class="branding">
        <span class="brand-name">play it twice</span>
        <span class="brand-tag">музыкальный<br>сервис</span>
      </div>
      <div class="search">
        <input type="text" id="searchInput" placeholder="Искать треки..." autocomplete="off">
        <div id="suggestions" class="suggestions"></div>
      </div>
    </header>

    <main class="main">
        <!-- Сайдбар -->
        <nav class="sidebar" aria-label="Основное меню">
            <button class="sb-btn" type="button" aria-current="page">Главная</button>
            <button class="sb-btn" type="button">Новинки</button>
            <button class="sb-btn" type="button">Артисты</button>
            <button class="sb-btn" type="button">Добавить трек</button>
        </nav>

        <!-- Карточка сборника -->
        <section class="card">
            <div class="hero">
            <div class="hero__cover">
                <img src="../../images/cover-track.jpg" alt="">
            </div>
            <div>
                <h1 class="hero__title">МУЗЫКА В МАШИНУ </h1>
                <p class="hero__desc">Сборник самой крутой танцевальной музыки подготовлен редакцией в честь дня рождения Dj Smash!</p>
            </div>
            </div>

            <!-- Треки -->
            <div class="tracks" id="tracksList">
               
            </div>
            <div id="scrollTrigger" style="height: 20px;"></div>
        </section>
    </main>
</div>

<!-- Плеер -->
    <section class="player" aria-label="Мини-плеер" id="miniPlayer">
      <div class="cover">
        <img src="../../images/semeinoe_photo_zoya_yachenko.jpg" alt="Обложка трека">
      </div>
      <div class="track-info">
        <div class="track-title">Семейное фото</div>
        <div class="track-meta">Зоя Ященко, Белая Гвардия · Венеция</div>
        <div class="progress">
          <div class="progress-bar" style="width: 35%;"></div>
        </div>
      </div>
      <div class="time">
        00:00
        <small>00:00</small>
      </div>
      <button class="action" type="button">Работа с треком</button>
    </section>

    <script>
const PLAYLISTS_API = `${API_BASE}/playlists`;

document.addEventListener("DOMContentLoaded", () => {
  loadPlaylist();
});

function getPlaylistId() {
  const params = new URLSearchParams(window.location.search);
  return params.get("playlist") || "1";
}

function getImageUrl(image) {
  if (!image) return "../../images/logo.png";

  if (image.includes("localhost")) {
    return `../../images/${image.split("/").pop()}`;
  }

  if (image.startsWith("https://")) {
    return image;
  }

  if (image.startsWith("http://")) {
    return `../../images/${image.split("/").pop()}`;
  }

  return `../../images/${image}`;
}

async function loadPlaylist() {
  const playlistId = getPlaylistId();
  const tracksList = document.getElementById("tracksList");

  tracksList.innerHTML = "<p>Загрузка сборника...</p>";

  try {
    const response = await fetch(`${PLAYLISTS_API}/${playlistId}`);

    if (!response.ok) {
      throw new Error(`Ошибка загрузки плейлиста: ${response.status}`);
    }

    const playlist = await response.json();

    renderPlaylistInfo(playlist);
    renderTracks(playlist.tracks || []);
  } catch (error) {
    console.error(error);
    tracksList.innerHTML = "<p>Не удалось загрузить сборник.</p>";
  }
}

function renderPlaylistInfo(playlist) {
  const title = document.querySelector(".hero__title");
  const desc = document.querySelector(".hero__desc");
  const cover = document.querySelector(".hero__cover img");

  if (title) title.textContent = playlist.title || "Сборник";
  if (desc) desc.textContent = playlist.description || "";
  if (cover) {
    cover.src = getImageUrl(playlist.image);
    cover.alt = playlist.title || "Обложка сборника";
  }
}

function renderTracks(tracks) {
  const tracksList = document.getElementById("tracksList");
  tracksList.innerHTML = "";

  if (!tracks.length) {
    tracksList.innerHTML = "<p>В сборнике пока нет треков.</p>";
    return;
  }

  tracks.forEach(track => {
    const article = document.createElement("article");
    article.className = "track";
    article.dataset.track = track.id;

    article.innerHTML = `
      <div class="track__thumb">
        <img src="${getImageUrl(track.image)}" alt="Обложка ${track.title || ""}">
      </div>

      <div class="track__info">
        <h3 class="track__title">${track.title || "Без названия"}</h3>
        <div class="track__meta">${track.artist || "Неизвестный артист"}</div>
      </div>

      <button class="track__btn" type="button">Работа с треком</button>
    `;

    article.addEventListener("click", e => {
      if (e.target.closest(".track__btn")) {
        e.stopPropagation();
        console.log("Работа с треком");
        return;
      }

      window.location.href = `../track_cards/track-card_01.html?track=${track.id}`;
    });

    tracksList.appendChild(article);
  });
}
</script>

</body>
</html>
